<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom World Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }

        .student-popup img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }
        .student-popup h3 { margin: 0 0 5px 0; color: #333; }
        .student-popup p { margin: 0; font-size: 14px; line-height: 1.4; color: #666; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    const map = L.map('map', {
        minZoom: 3, 
        maxZoom: 18,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0 
    }).setView([38, 60], 3);

        // Map tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            noWrap: true, 
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        const students = [
                { name: "IVAN", country: "ENGLAND", coords: [51.5074, -0.1278], image: "ivan.jpg" },
                { name: "PETER", country: "ENGLAND", coords: [53.4808, -2.2426], image: "peter.jpg" },
                { name: "NOURY", country: "ARMENIA", coords: [40.1792, 44.4991], image: "noury.jpg" },
                { name: "LUCY", country: "UKRAINE", coords: [50.4501, 30.5234], image: "lucy.jpg" },
                { name: "KIRAN", country: "NETHERLANDS", coords: [52.3676, 4.9041], image: "kiran.jpg" },
                { name: "BENJI", country: "ESTONIA", coords: [59.4370, 24.7536], image: "benjamin.jpg" },
                { name: "CARLO CESARE", country: "ITALY", coords: [41.8719, 12.5674], image: "carlo.jpg" },
                { name: "EGOR", country: "RUSSIA", coords: [55.7558, 37.6173], image: "egor.jpg" },
                { name: "MAHNOOR", country: "UNITED ARAB EMIRATES", coords: [25.2048, 55.2708], image: "mahnoor.jpg" },
                { name: "ABDULLAH ALRASHID", country: "SAUDI ARABIA", coords: [24.7136, 46.6753], image: "abdullah.jpg" },
                { name: "MARIA THEREZA", country: "BRAZIL", coords: [-23.5505, -46.6333], image: "maria_thereza.jpg" },
                { name: "BADRAN", country: "SAUDI ARABIA", coords: [21.4858, 39.1925], image: "badran.jpg" },
                { name: "OPHELIA", country: "HONG KONG", coords: [22.3193, 114.1694], image: "ophelia.jpg" },
                { name: "RITA", country: "ARMENIA", coords: [40.7858, 43.8417], image: "rita.jpg" },
                { name: "REEMA", country: "SAUDI ARABIA", coords: [26.4207, 50.0888], image: "reema.jpg" },
                { name: "HELENA", country: "BRAZIL", coords: [-22.9068, -43.1729], image: "helena.jpg" },
                { name: "AVRAJ", country: "TANZANIA", coords: [-6.7924, 39.2083], image: "avraj.jpg" },
                { name: "ARJUN", country: "TANZANIA", coords: [-3.3869, 36.6830], image: "arjun.jpg" },
                { name: "MINEL", country: "TURKEY", coords: [41.0082, 28.9784], image: "minel.jpg" },
                { name: "MAYA", country: "TURKEY", coords: [39.9334, 32.8597], image: "maya.jpg" },
                { name: "LEYLA", country: "TURKEY", coords: [38.4237, 27.1428], image: "leyla.jpg" },
                { name: "JUDE", country: "SAUDI ARABIA", coords: [24.4686, 39.6142], image: "jude.JPG" },
                { name: "DAVID", country: "UNITED KINGDOM", coords: [55.9533, -3.1883], image: "david.JPG" },
                { name: "ROBERT", country: "ARMENIA", coords: [39.8264, 44.6980], image: "robert.JPG" },
                { name: "DANU", country: "SOUTH KOREA", coords: [37.5665, 126.9780], image: "danu.JPG" },
                { name: "KLIM", country: "RUSSIA", coords: [59.9342, 30.3351], image: "klim.JPG" },
                { name: "MADISON", country: "GERMANY", coords: [52.5200, 13.4050], image: "madison.JPG" },
                { name: "YASEEN", country: "UNITED STATES", coords: [37.0902, -95.7129], image: "yaseen.JPG" },
                { name: "GUIDO", country: "ITALY", coords: [40.8518, 14.2681], image: "guido.JPG" },
                { name: "ALESSANDRO", country: "ITALY", coords: [45.4642, 9.1900], image: "alessandro.JPG" },
                { name: "KHALID", country: "SAUDI ARABIA", coords: [28.3835, 36.5662], image: "khalid.JPG" }
];
      
        
        students.forEach(student => {
            const marker = L.marker(student.coords).addTo(map);
            
            // Only render an image tag if student.image exists
            const imageHtml = student.image ? `<img src="${student.image}" alt="${student.name}">` : '';

            const popupContent = `
                <div class="student-popup">
                    ${imageHtml}
                    <h3>${student.name}</h3>
                    <p>Country: ${student.country}</p>
                </div>
            `;
            
            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
