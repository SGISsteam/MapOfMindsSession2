<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom World Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }

        .student-popup img {
            width: 100%;
            max-width: 200px;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }
        .student-popup h3 { margin: 0 0 5px 0; color: #333; }
        .student-popup p { margin: 0; font-size: 14px; line-height: 1.4; color: #666; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    const map = L.map('map', {
        minZoom: 3, 
        maxZoom: 18,
        maxBounds: [[-90, -180], [90, 180]],
        maxBoundsViscosity: 1.0 
    }).setView([38, 60], 3);

        // Map tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO',
            subdomains: 'abcd',
            noWrap: true, 
            bounds: [[-90, -180], [90, 180]]
        }).addTo(map);

        const students = [
            { name: "IVAN", country: "ENGLAND", coords: [55.3781, -3.4360] },
            { name: "PETER", country: "ENGLAND", coords: [55.3781, -3.4360] },
            { name: "NOURY", country: "ARMENIA", coords: [40.0691, 45.0382] },
            { name: "LUCY", country: "UKRAINE", coords: [48.3794, 31.1656] },
            { name: "KIRAN", country: "NETHERLANDS", coords: [52.1326, 5.2913][] },
            { name: "BENJI", country: "ESTONIA", coords: [58.5953, 25.0136] },
            { name: "CARLO CESARE", country: "ITALY", coords: [41.8719, 12.5674] },
            { name: "EGOR", country: "RUSSIA", coords: [61.5240, 105.3188]},
            { name: "MAHNOOR", country: "UNITED ARAB EMIRATES", coords: [23.4241, 53.8478]},
            { name: "ABDULLAH ALRASHID", country: "SAUDI ARABIA", coords: [23.8859, 45.0792]},
            
            { name: "IVAN", country: "ENGLAND", coords: [55.3781, -3.4360] },
            { name: "PETER", country: "ENGLAND", coords: [55.3781, -3.4360] },
            { name: "NOURY", country: "ARMENIA", coords: [40.0691, 45.0382] },
            { name: "LUCY", country: "UKRAINE", coords: [48.3794, 31.1656] },
            { name: "KIRAN", country: "NETHERLANDS", coords: [52.1326, 5.2913][] },
            { name: "BENJI", country: "ESTONIA", coords: [58.5953, 25.0136] },
            { name: "CARLO CESARE", country: "ITALY", coords: [41.8719, 12.5674] },
            { name: "EGOR", country: "RUSSIA", coords: [61.5240, 105.3188]},
            { name: "MAHNOOR", country: "UNITED ARAB EMIRATES", coords: [23.4241, 53.8478]},
            { name: "ABDULLAH ALRASHID", country: "SAUDI ARABIA", coords: [23.8859, 45.0792]},
            
            { name: "JUDE", country: "SAUDI ARABIA", coords: [24.7136, 46.6753], image: "jude.png" },
            { name: "DAVID", country: "UNITED KINGDOM", coords: [55.3781, -3.4360], image: "david.png" },
            { name: "ROBERT", country: "ARMENIA", coords: [40.0691, 45.0382], image: "robert.png" },
            { name: "DANU", country: "SOUTH KOREA", coords: [35.9078, 127.7669], image: "danu.png" },
            { name: "KLIM", country: "RUSSIA", coords: [61.5240, 105.3188], image: "klim.png" },
            { name: "MADISON", country: "GERMANY", coords: [51.1657, 10.4515], image: "madison.png" },
            { name: "YASEEN", country: "UNITED STATES", coords: [37.0902, -95.7129], image: "yaseen.png" },
            { name: "GUIDO", country: "ITALY", coords: [41.8719, 12.5674], image: "guido.png" },
            { name: "ALESSANDRO", country: "ITALY", coords: [45.4642, 9.1900], image: "alessandro.png" },
            { name: "KHALID", country: "SAUDI ARABIA", coords: [23.8859, 45.0792], image: "khalid.png" }
        ];
        
        students.forEach(student => {
            const marker = L.marker(student.coords).addTo(map);
            
            const popupContent = `
                <div class="student-popup">
                    <img src="${student.image}" alt="${student.name}">
                    <h3>${student.name}</h3>
                    <p>Country: ${student.country}</p>
                </div>
            `;
            
            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
